<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider</title>
    <script type="module" src="./main.ts" async></script>
  </head>
  <body>
    <a href="../../" class="btn btn--back">← Accueil</a>
    <h1>Exemple slider</h1>

    <div class="swiper slider">
      <div class="swiper-wrapper">
        <div class="swiper-slide">1</div>
        <div class="swiper-slide">2</div>
        <div class="swiper-slide">3</div>
        <div class="swiper-slide">4</div>
        <div class="swiper-slide">5</div>
        <div class="swiper-slide">6</div>
        <div class="swiper-slide">7</div>
      </div>
    </div>

    <div class="swiper macarons" id="slider">
      <div id="circle"></div>
      <div class="swiper-wrapper">
        <div
          class="swiper-slide"
          data-background="#E6E8D1"
          data-circle="#878149"
        >
          0
          <img src="./assets/macaron1.png" alt="Macaron 1" />
        </div>
        <div
          class="swiper-slide"
          data-background="#9D90A4"
          data-circle="#EFF1E4"
        >
          1
          <img src="./assets/macaron2.png" alt="Macaron 2" />
        </div>
        <div
          class="swiper-slide"
          data-background="#ECEDA5"
          data-circle="#9D9F4F"
        >
          2
          <img src="./assets/macaron3.png" alt="Macaron 3" />
        </div>
        <div
          class="swiper-slide"
          data-background="#BBC756"
          data-circle="#867F0D"
        >
          3
          <img src="./assets/macaron4.png" alt="Macaron 4" />
        </div>
        <div
          class="swiper-slide"
          data-background="#FED69E"
          data-circle="#A16F32"
        >
          4
          <img src="./assets/macaron5.png" alt="Macaron 5" />
        </div>
        <div
          class="swiper-slide"
          data-background="#FFC573"
          data-circle="#BE553E"
        >
          5
          <img src="./assets/macaron6.png" alt="Macaron 6" />
        </div>
      </div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
    </div>
  </body>
</html>
